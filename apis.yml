name: Looker Studio
description: >-
  Looker Studio (formerly Google Data Studio) is a free tool that turns your
  data into informative, easy to read, easy to share, and fully customizable
  dashboards and reports. The API allows developers to programmatically manage
  assets, build custom connectors and visualizations, embed reports, and
  automate workflows.
image: https://www.gstatic.com/analytics-suite/header/suite/v2/ic_data_studio.svg
url: https://lookerstudio.google.com
created: '2024-01-15'
modified: '2026-03-16'
