apis:
  - name: Looker Studio API
    description: >-
      The Looker Studio API enables developers to programmatically manage
      reports, data sources, and permissions. It provides methods for searching
      assets and managing asset permissions including getting, updating, adding,
      and removing members.
    image: >-
      https://www.gstatic.com/analytics-suite/header/suite/v2/ic_data_studio.svg
    humanURL: https://developers.google.com/looker-studio/integrate/api
    baseURL: https://datastudio.googleapis.com/v1
    tags:
      - Assets
      - Automation
      - Data Sources
      - Permissions
      - Reports
    properties:
      - type: Documentation
        url: https://developers.google.com/looker-studio/integrate/api
      - type: Reference
        url: https://developers.google.com/looker-studio/integrate/api/reference
      - type: OpenAPI
        url: openapi/looker-studio-api-openapi.yml
      - type: OpenAPI
        url: https://lookerstudio.googleapis.com/$discovery/rest?version=v1
      - type: Authentication
        url: https://developers.google.com/looker-studio/api/authentication
      - type: Getting Started
        url: https://developers.google.com/looker-studio/api/quickstart
      - type: SDKs
        url: https://developers.google.com/looker-studio/api/client-libraries
      - type: Rate Limits
        url: https://developers.google.com/looker-studio/api/quotas
      - type: Errors
        url: https://developers.google.com/looker-studio/api/errors
      - type: JSON Schema
        url: json-schema/looker-studio-asset-schema.json
      - type: JSON Schema
        url: json-schema/looker-studio-permissions-schema.json
      - type: JSON Schema
        url: json-schema/looker-studio-report-schema.json
      - type: JSON Schema
        url: json-schema/looker-studio-data-source-schema.json
  - name: Looker Studio Linking API
    description: >-
      The Looker Studio Linking API enables the creation of dynamic URLs that
      link to pre-configured reports. It allows developers to define data
      sources, control report behavior, and customize settings through URL
      parameters.
    humanURL: https://developers.google.com/looker-studio/integrate/linking-api
    baseURL: https://lookerstudio.google.com
    tags:
      - Data Sources
      - Integration
      - Linking
      - Reports
      - URL Parameters
    properties:
      - type: Documentation
        url: https://developers.google.com/looker-studio/integrate/linking-api
      - type: OpenAPI
        url: openapi/looker-studio-linking-api-openapi.yml
  - name: Looker Studio Embedding API
    description: >-
      Embed Looker Studio reports in your applications using HTML iframe tags,
      oEmbed, and Open Graph Tags with customizable parameters and filtering
      options. Supports embedding on platforms like Medium and Reddit.
    humanURL: https://developers.google.com/looker-studio/integrate/embed
    baseURL: https://lookerstudio.google.com/embed
    tags:
      - Embedding
      - Iframe
      - Integration
      - Reports
      - Sharing
    properties:
      - type: Documentation
        url: https://developers.google.com/looker-studio/integrate/embed
      - type: OpenAPI
        url: openapi/looker-studio-embedding-api-openapi.yml
      - type: Getting Started
        url: >-
          https://developers.google.com/looker-studio/integrate/embedding-api/get-started
      - type: Security
        url: >-
          https://developers.google.com/looker-studio/connector/embed-row-level-security
  - name: Looker Studio Community Connector API
    description: >-
      Build custom data connectors to bring data from any source into Looker
      Studio. Connectors are built using Google Apps Script and implement three
      core functions: getConfig(), getSchema(), and getData().
    humanURL: https://developers.google.com/looker-studio/connector
    baseURL: https://datastudio.google.com/datasources/create
    tags:
      - Apps Script
      - Connectors
      - Custom Integration
      - Data Sources
      - ETL
    properties:
