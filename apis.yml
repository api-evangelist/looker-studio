        url: json-schema/looker-studio-connector-schema.json
  - name: Looker Studio Community Visualization API
    description: >-
      Build and deploy custom visualizations for Looker Studio using any
      JavaScript visualization library. The dscc helper library simplifies
      development by providing functions for data subscriptions, component
      dimensions, and user interactions.
    humanURL: https://developers.google.com/looker-studio/visualization
